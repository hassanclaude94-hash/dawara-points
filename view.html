<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ram & Sam — Star Board</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0F0E17;
  --card: #1A1827;
  --card2: #201E2E;
  --border: rgba(255,255,255,0.07);
  --text: #F5F3FF;
  --muted: #7B78A0;
  --ram-a: #52D9A0;
  --ram-b: #1B9E6E;
  --ram-bg: rgba(82,217,160,0.1);
  --sam-a: #FFB347;
  --sam-b: #CC7A00;
  --sam-bg: rgba(255,179,71,0.1);
  --gold: #FFD700;
  --silver: #C0C0C0;
  --radius: 20px;
  --radius-sm: 12px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Nunito', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  padding: 1.25rem 1rem 2.5rem;
  overflow-x: hidden;
}

/* ── Stars background ── */
body::before {
  content: '';
  position: fixed; inset: 0; z-index: 0;
  background-image:
    radial-gradient(1px 1px at 15% 20%, rgba(255,255,255,0.4) 0%, transparent 100%),
    radial-gradient(1px 1px at 35% 60%, rgba(255,255,255,0.3) 0%, transparent 100%),
    radial-gradient(1px 1px at 55% 10%, rgba(255,255,255,0.5) 0%, transparent 100%),
    radial-gradient(1px 1px at 75% 45%, rgba(255,255,255,0.3) 0%, transparent 100%),
    radial-gradient(1px 1px at 90% 80%, rgba(255,255,255,0.4) 0%, transparent 100%),
    radial-gradient(1px 1px at 20% 85%, rgba(255,255,255,0.3) 0%, transparent 100%),
    radial-gradient(1px 1px at 60% 75%, rgba(255,255,255,0.4) 0%, transparent 100%),
    radial-gradient(1px 1px at 80% 15%, rgba(255,255,255,0.3) 0%, transparent 100%);
  pointer-events: none;
}

.wrap { position: relative; z-index: 1; max-width: 520px; margin: 0 auto; }

/* ── Header ── */
header { text-align: center; margin-bottom: 1.75rem; }

.header-title {
  font-size: 28px; font-weight: 900;
  color: var(--text); letter-spacing: -0.5px;
  margin-bottom: 2px;
}

.header-sub {
  font-size: 13px; color: var(--muted); margin-bottom: 12px;
}

.clock-pill {
  display: inline-flex; align-items: center; gap: 10px;
  background: var(--card); border: 1px solid var(--border);
  border-radius: 40px; padding: 7px 18px;
}
.clock-dot {
  width: 7px; height: 7px; border-radius: 50%;
  background: var(--ram-a); animation: blink 1.2s infinite;
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }
.clock-time {
  font-size: 16px; font-weight: 800; color: var(--text);
  font-variant-numeric: tabular-nums;
}
.clock-date { font-size: 11px; color: var(--muted); }

/* ── VS Banner ── */
.vs-banner {
  display: grid; grid-template-columns: 1fr auto 1fr;
  align-items: center; gap: 10px;
  margin-bottom: 1.25rem;
}
.vs-side {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 14px 12px;
  text-align: center;
}
.vs-side.ram { border-color: rgba(82,217,160,0.25); }
.vs-side.sam { border-color: rgba(255,179,71,0.25); }
.vs-avatar {
  width: 50px; height: 50px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 22px; font-weight: 900; margin: 0 auto 6px;
}
.av-ram { background: var(--ram-bg); color: var(--ram-a); border: 2px solid var(--ram-a); }
.av-sam { background: var(--sam-bg); color: var(--sam-a); border: 2px solid var(--sam-a); }
.vs-name { font-size: 15px; font-weight: 800; }
.vs-pts  { font-size: 34px; font-weight: 900; line-height: 1.1; }
.vs-pts.ram { color: var(--ram-a); }
.vs-pts.sam { color: var(--sam-a); }
.vs-label { font-size: 11px; color: var(--muted); font-weight: 600; }

.vs-circle {
  width: 48px; height: 48px; border-radius: 50%;
  background: var(--card2); border: 1px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  font-size: 15px; font-weight: 900; color: var(--muted);
  flex-shrink: 0;
}

/* leader badge */
.leader-crown {
  font-size: 18px; display: block; margin-bottom: 2px;
  animation: bounce 1.5s infinite;
}
@keyframes bounce {
  0%,100%{transform:translateY(0)} 50%{transform:translateY(-4px)}
}

/* ── Progress comparison bar ── */
.compare-section {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 1rem 1.25rem;
  margin-bottom: 1.25rem;
}
.compare-title {
  font-size: 12px; font-weight: 800; color: var(--muted);
  text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 12px;
}
.compare-row { margin-bottom: 12px; }
.compare-row:last-child { margin-bottom: 0; }
.compare-top {
  display: flex; justify-content: space-between;
  font-size: 13px; font-weight: 700; margin-bottom: 5px;
}
.bar-bg {
  height: 12px; background: rgba(255,255,255,0.06);
  border-radius: 6px; overflow: hidden;
}
.bar-fill {
  height: 100%; border-radius: 6px;
  transition: width 0.7s cubic-bezier(.4,0,.2,1);
}
.bar-ram { background: linear-gradient(90deg, var(--ram-b), var(--ram-a)); }
.bar-sam { background: linear-gradient(90deg, var(--sam-b), var(--sam-a)); }

/* ── Kid Cards ── */
.kid-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  margin-bottom: 12px;
  overflow: hidden;
}
.kid-card.ram { border-color: rgba(82,217,160,0.2); }
.kid-card.sam { border-color: rgba(255,179,71,0.2); }

.kid-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 1rem 1.25rem 0.75rem;
  border-bottom: 1px solid var(--border);
}
.kid-left { display: flex; align-items: center; gap: 10px; }
.kid-name { font-size: 17px; font-weight: 900; }
.kid-age  { font-size: 11px; color: var(--muted); font-weight: 600; }
.kid-pts  { font-size: 38px; font-weight: 900; line-height: 1; }
.kid-pts.ram { color: var(--ram-a); }
.kid-pts.sam { color: var(--sam-a); }
.pts-den  { font-size: 12px; color: var(--muted); font-weight: 600; text-align: right; }

.status-row {
  padding: 8px 1.25rem 10px;
  display: flex; align-items: center; gap: 8px;
  border-bottom: 1px solid var(--border);
}
.badge {
  font-size: 11px; font-weight: 800;
  padding: 4px 12px; border-radius: 20px;
}
.b-green { background: rgba(82,217,160,0.15); color: var(--ram-a); }
.b-amber { background: rgba(255,179,71,0.15);  color: var(--sam-a); }
.b-red   { background: rgba(220,50,80,0.15);   color: #FF6B7A; }
.reward-txt { font-size: 12px; color: var(--muted); font-weight: 600; }

/* ── Log ── */
.log-section { padding: 0.9rem 1.25rem; }
.log-title {
  font-size: 11px; font-weight: 800; color: var(--muted);
  text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 8px;
}
.log-list { display: flex; flex-direction: column; gap: 5px; }
.log-item {
  display: flex; justify-content: space-between; align-items: center;
  padding: 7px 10px; border-radius: var(--radius-sm);
  font-size: 12px;
}
.log-item.plus  { background: rgba(82,217,160,0.1); }
.log-item.minus { background: rgba(220,50,80,0.1); }
.log-label { font-weight: 700; color: var(--text); }
.log-meta  { display: flex; align-items: center; gap: 8px; }
.log-time  { font-size: 11px; color: var(--muted); }
.log-pts   { font-weight: 800; font-size: 13px; }
.log-pts.plus  { color: var(--ram-a); }
.log-pts.minus { color: #FF6B7A; }
.log-empty { font-size: 12px; color: var(--muted); text-align: center; padding: 8px 0; font-weight: 600; }

/* ── Motivation quote ── */
.quote-box {
  background: var(--card2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 1rem 1.25rem;
  text-align: center;
  margin-bottom: 12px;
}
.quote-text {
  font-size: 15px; font-weight: 700; color: var(--text);
  line-height: 1.5; margin-bottom: 6px;
}
.quote-author { font-size: 11px; color: var(--muted); font-weight: 600; }

/* ── Footer ── */
.footer-note {
  text-align: center; font-size: 11px; color: var(--muted);
  margin-top: 1.5rem; font-weight: 600;
}
</style>
</head>
<body>
<div class="wrap">

<header>
  <div class="header-title">⭐ Star Board</div>
  <div class="header-sub">Weekly Points Tracker — Dawara Family</div>
  <div class="clock-pill">
    <div class="clock-dot"></div>
    <div class="clock-time" id="clock-time">00:00</div>
    <div class="clock-date" id="clock-date"></div>
  </div>
</header>

<div id="main-content">
  <div style="text-align:center;padding:3rem 1rem;color:var(--muted);font-size:15px;font-weight:700">
    Loading star board...
  </div>
</div>

<div class="footer-note" id="footer-note"></div>

</div>

<script>
const QUOTES = [
  { text: "Every point is a step towards your goal. Keep going!", author: "— Keep it up 🚀" },
  { text: "The secret of getting ahead is getting started.", author: "— Mark Twain" },
  { text: "Small actions every day lead to big results!", author: "— Stay consistent 💪" },
  { text: "You don't have to be perfect. Just be better than yesterday.", author: "— Daily progress ✨" },
  { text: "Champions aren't made in gyms — they're made from what they have inside.", author: "— Muhammad Ali" },
  { text: "Believe you can and you're halfway there.", author: "— Theodore Roosevelt" },
];

function updateClock() {
  const now = new Date();
  document.getElementById('clock-time').textContent =
    now.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', hour12: false });
  document.getElementById('clock-date').textContent =
    now.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
}
setInterval(updateClock, 1000); updateClock();

function getStatus(p) {
  if (p >= 80) return { text: '🏆 Excellent', reward: 'Activity reward at week end!', bc: 'b-green' };
  if (p >= 60) return { text: '👍 Good',      reward: 'Normal screen time',           bc: 'b-amber' };
  if (p >= 40) return { text: '📈 Improving', reward: 'Reduced screen time',          bc: 'b-amber' };
  return             { text: '⚠️ Try harder', reward: 'Activity suspended',            bc: 'b-red'   };
}

function parseLog(entry) {
  const m = entry.match(/^(\S+)\s([+\-]\d+)\s—\s(.+)$/);
  if (m) return { time: m[1], delta: parseInt(m[2]), label: m[3] };
  return { time: '', delta: 0, label: entry };
}

function buildKidCard(name, age, cls, pts, logs) {
  const MAX = 100;
  const p = Math.max(0, Math.min(120, pts));
  const st = getStatus(p);

  const logItems = logs.slice(0, 5).map(e => {
    const l = parseLog(e);
    const isPlus = l.delta >= 0;
    const sign = isPlus ? '+' : '';
    return `<div class="log-item ${isPlus ? 'plus' : 'minus'}">
      <span class="log-label">${l.label || e}</span>
      <div class="log-meta">
        <span class="log-time">${l.time}</span>
        <span class="log-pts ${isPlus ? 'plus' : 'minus'}">${sign}${l.delta}</span>
      </div>
    </div>`;
  }).join('');

  return `
  <div class="kid-card ${cls}">
    <div class="kid-header">
      <div class="kid-left">
        <div class="kid-avatar av-${cls}">${name[0]}</div>
        <div>
          <div class="kid-name">${name}</div>
          <div class="kid-age">${age} years old</div>
        </div>
      </div>
      <div style="text-align:right">
        <div class="kid-pts ${cls}">${p}</div>
        <div class="pts-den">/ 100 pts</div>
      </div>
    </div>
    <div class="status-row">
      <span class="badge ${st.bc}">${st.text}</span>
      <span class="reward-txt">${st.reward}</span>
    </div>
    <div class="log-section">
      <div class="log-title">Recent Activity</div>
      <div class="log-list">
        ${logItems || '<div class="log-empty">No activity yet this week</div>'}
      </div>
    </div>
  </div>`;
}

function render() {
  const raw = localStorage.getItem('dawara-pts');
  const el = document.getElementById('main-content');

  if (!raw) {
    el.innerHTML = `<div style="text-align:center;padding:3rem 1rem;color:var(--muted);font-weight:700;font-size:14px">
      No data yet. Open the main board first on the same device.
    </div>`;
    return;
  }

  const d    = JSON.parse(raw);
  const pts  = d.pts  || [100, 100];
  const logs = d.logs || [[], []];

  const ramPts = Math.max(0, Math.min(120, pts[0]));
  const samPts = Math.max(0, Math.min(120, pts[1]));
  const MAX = 100;

  // Leader
  let leaderRam = '', leaderSam = '';
  if (ramPts > samPts)      leaderRam = '<span class="leader-crown">👑</span>';
  else if (samPts > ramPts) leaderSam = '<span class="leader-crown">👑</span>';
  else { leaderRam = '<span class="leader-crown">🤝</span>'; leaderSam = '<span class="leader-crown">🤝</span>'; }

  // Gap message
  const diff = Math.abs(ramPts - samPts);
  let gapMsg = '';
  if (diff === 0)       gapMsg = "It's a tie! Can you pull ahead? 🔥";
  else if (diff <= 10)  gapMsg = `Only ${diff} points apart — so close! ⚡`;
  else if (diff <= 25)  gapMsg = `${diff} points gap — catch up is possible! 💨`;
  else                  gapMsg = `${diff} points apart — time to level up! 🚀`;

  // Random quote
  const q = QUOTES[Math.floor((Date.now() / 60000)) % QUOTES.length];

  el.innerHTML = `
  <div class="vs-banner">
    <div class="vs-side ram">
      ${leaderRam}
      <div class="kid-avatar av-ram" style="width:44px;height:44px;font-size:19px;margin:0 auto 5px">R</div>
      <div class="vs-name">Ram</div>
      <div class="vs-pts ram">${ramPts}</div>
      <div class="vs-label">pts</div>
    </div>
    <div class="vs-circle">VS</div>
    <div class="vs-side sam">
      ${leaderSam}
      <div class="kid-avatar av-sam" style="width:44px;height:44px;font-size:19px;margin:0 auto 5px">S</div>
      <div class="vs-name">Sam</div>
      <div class="vs-pts sam">${samPts}</div>
      <div class="vs-label">pts</div>
    </div>
  </div>

  <div class="compare-section">
    <div class="compare-title">Weekly Progress</div>
    <div class="compare-row">
      <div class="compare-top">
        <span style="color:var(--ram-a);font-weight:800">Ram</span>
        <span style="color:var(--ram-a)">${ramPts} / 100</span>
      </div>
      <div class="bar-bg"><div class="bar-fill bar-ram" style="width:${Math.min(100,Math.round(ramPts/MAX*100))}%"></div></div>
    </div>
    <div class="compare-row">
      <div class="compare-top">
        <span style="color:var(--sam-a);font-weight:800">Sam</span>
        <span style="color:var(--sam-a)">${samPts} / 100</span>
      </div>
      <div class="bar-bg"><div class="bar-fill bar-sam" style="width:${Math.min(100,Math.round(samPts/MAX*100))}%"></div></div>
    </div>
    <div style="text-align:center;margin-top:10px;font-size:13px;font-weight:700;color:var(--muted)">${gapMsg}</div>
  </div>

  <div class="quote-box">
    <div class="quote-text">"${q.text}"</div>
    <div class="quote-author">${q.author}</div>
  </div>

  ${buildKidCard('Ram', 8, 'ram', pts[0], logs[0])}
  ${buildKidCard('Sam', 5, 'sam', pts[1], logs[1])}
  `;

  // footer
  const now = new Date();
  document.getElementById('footer-note').textContent =
    `Last updated: ${now.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'})} · Auto-refreshes every 10 seconds`;
}

render();
setInterval(render, 10000);
</script>
</body>
</html>
